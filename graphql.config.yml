
watch:
 - schema.graphql
 - graphql/*.graphql

schema: schema.graphql
documents: "graphql/*.graphql"
overwrite: true

config:
  avoidOptionals:
    field: true
    inputValue: false
    object: false
  enumsAsTypes: true
  scalars:
    BigFloat: "string"
    Datetime: "string"
    Date: "string"
    Time: "string"
    BigInt: "string"

generates:
  "./frontend/graphql/index.ts":
    plugins:
      - add:
          content: "/* DO NOT EDIT! This file is auto-generated by graphql-code-generator - see `codegen.yml` */"
      - add:
          content: "/* eslint-disable */"
      - typescript
      - typescript-urql-graphcache
    config:
      withTypeImports: true
      useTypeImports: true

  "./frontend/graphql/":
    preset: 'near-operation-file'
    presetConfig:
      extension: '.ts'
      baseTypesPath: 'index.ts'
      folder: '../frontend/graphql'
    plugins:
      - add:
          content: "/* DO NOT EDIT! This file is auto-generated by graphql-code-generator - see `codegen.yml` */"
      - add:
          content: "/* eslint-disable */"
      - "typescript-operations"
      - "typed-document-node"

  "./frontend/graphql/introspection.json":
    plugins:
      - urql-introspection
    config:
      module: es2015
