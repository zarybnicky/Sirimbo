query FoldersAndSeasons {
  folders {
    key
    name
    order_value
  }
  seasons {
    key
    name
    order_value
  }
}

query EnumerateCourses($folder: String!, $season: String!) {
  courses(folder_key: $folder, season_key: $season) {
    key
    name
    period
    code
  }
}

query Course($key: String!) {
  course(key: $key) {
    key
    order_value
    name
    code
    capacity
    card_line_1
    card_line_2
    period
    first_period
    teacher
    place
    comment
  }
  students(course_key: $key, filter_status: IN) {
    key
    course_key
    sex
    ref_key
    partner_ref_key
    name
    surname
    email
    phone
    year
    street
    street_no
    city
    post_code
  }
}
