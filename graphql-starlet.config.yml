
watch:
 - frontend/starlet/schema.graphql
 - frontend/starlet/graphql/*.graphql

schema: ./frontend/starlet/schema.graphql
documents: "./frontend/starlet/graphql/*.graphql"
overwrite: true

config:
  avoidOptionals:
    field: true
    inputValue: false
    object: false
  enumsAsTypes: true
  scalars:
    Datetime: "string"
    Date: "string"
    Time: "string"
    BigInt: "string"

generates:
  "./frontend/starlet/graphql/index.ts":
    plugins:
      - add:
          content: "/* DO NOT EDIT! This file is auto-generated by graphql-code-generator - see `codegen.yml` */"
      - add:
          content: "/* eslint-disable */"
      - typescript
      - typescript-urql-graphcache
    config:
      withTypeImports: true
      useTypeImports: true

  "./frontend/starlet/graphql/":
    preset: 'near-operation-file'
    presetConfig:
      extension: '.ts'
      baseTypesPath: 'index.ts'
      folder: '.'
    plugins:
      - add:
          content: "/* DO NOT EDIT! This file is auto-generated by graphql-code-generator - see `codegen.yml` */"
      - add:
          content: "/* eslint-disable */"
      - "typescript-operations"
      - "typed-document-node"
