query EventOverlapsReport($since: Datetime!, $until: Datetime) {
  attendeeConflicts: eventOverlapsAttendeeReportList(pSince: $since, pUntil: $until) {
    personId
    personName
    firstInstanceId
    firstEventName
    firstSince
    firstUntil
    secondInstanceId
    secondEventName
    secondSince
    secondUntil
  }
  trainerConflicts: eventOverlapsTrainerReportList(pSince: $since, pUntil: $until) {
    personId
    personName
    firstInstanceId
    firstEventName
    firstSince
    firstUntil
    secondInstanceId
    secondEventName
    secondSince
    secondUntil
  }
}
