fragment CohortBasic on Cohort {
  id
  name
  colorRgb
}

fragment Cohort on Cohort {
  id
  name
  location
  isVisible
  isArchived
  colorRgb
  ordering
  description
  cohortGroupId
  externalIds
}

query CohortList($first: Int, $offset: Int, $visible: Boolean, $archived: Boolean) {
  cohortsList(first: $first, offset: $offset, condition: {isVisible: $visible, isArchived: $archived}, orderBy: [ORDERING_ASC]) {
    ...Cohort
  }
}

fragment CstsProgressRecord on PersonCstsProgressRecord {
  competitorName
  category {
    id
    name
    discipline
    series
    ageGroup
    competitorType
    class
  }
  points
  finals
}

query CohortWithMembers($id: BigInt!) {
  entity: cohort(id: $id) {
    ...Cohort
    cohortMembershipsList(condition: {status: ACTIVE}) {
      ...CohortMembership
      person {
        ...Person
        id
        birthDate
        cstsProgressList {
          ...CstsProgressRecord
        }
      }
    }
  }
}

query Cohort($id: BigInt!) {
  entity: cohort(id: $id) {
    ...Cohort
  }
}

mutation CreateCohort($input: CohortInput!) {
  createCohort(input: {cohort: $input}) {
    cohort {
      ...Cohort
    }
  }
}

mutation UpdateCohort($id: BigInt!, $patch: CohortPatch!) {
  updateCohort(input: {id: $id, patch: $patch}) {
    cohort {
      ...Cohort
    }
  }
}

mutation ArchiveCohort($id: BigInt!) {
  archiveCohort(input: {cohortId: $id}) {
    __typename
  }
}

mutation SyncCohortMemberships($input: SyncCohortMembershipsInput!) {
  syncCohortMemberships(input: $input) {
    __typename
  }
}
