query CompetitionBrief($since: Date, $until: Date, $personIds: [BigInt], $cohortId: BigInt) {
  competitionBriefList(pCohortId: $cohortId, pPersonIds: $personIds, pSince: $since, pUntil: $until) {
    eventId
    eventName
    eventLocation
    competitionId
    competitionDate
    competitorId
    competitorName
    personId
    personName
    checkInEnd
    dances
    category {
      name
      class
      series
      ageGroup
      discipline
    }
  }
}

query CompetitionReport($since: Date, $until: Date, $personIds: [BigInt], $cohortId: BigInt) {
  competitionReportList(pCohortId: $cohortId, pPersonIds: $personIds, pSince: $since, pUntil: $until) {
    eventId
    eventName
    eventLocation
    competitionId
    competitionDate
    competitorId
    competitorName
    personId
    personName
    participants
    ranking
    rankingTo
    pointGain
    isFinal
    category {
      name
      class
      series
      ageGroup
      discipline
    }
  }
}
