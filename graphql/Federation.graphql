fragment CompetitionCategory on Category {
  id
  name
  class
  series
  ageGroup
  discipline
  competitorType
}


query CompetitionBrief($since: Date, $until: Date, $personIds: [BigInt], $cohortId: BigInt) {
  competitionBriefList(pCohortId: $cohortId, pPersonIds: $personIds, pSince: $since, pUntil: $until) {
    eventId
    eventName
    eventLocation
    competitionId
    competitionDate
    competitionType
    competitorId
    competitorName
    personId
    personName
    checkInEnd
    category {
      ...CompetitionCategory
    }
  }
}

query CompetitionReport($since: Date, $until: Date, $personIds: [BigInt], $cohortId: BigInt) {
  competitionReportList(pCohortId: $cohortId, pPersonIds: $personIds, pSince: $since, pUntil: $until) {
    eventId
    eventName
    eventLocation
    competitionId
    competitionDate
    competitionType
    competitorId
    competitorName
    personId
    personName
    participants
    ranking
    rankingTo
    pointGain
    isFinal
    category {
      ...CompetitionCategory
    }
  }
}
