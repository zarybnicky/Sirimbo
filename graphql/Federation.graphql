query Competitions {
  competitionBriefList {
    ageGroup
    categoryName
    checkInEnd
    class
    competitionDate
    competitionId
    competitorId
    competitorName
    dances
    discipline
    eventId
    eventLocation
    eventName
    personId
    personName
  }
  competitionReportList {
    ageGroup
    categoryName
    class
    competitionDate
    competitionId
    competitorId
    competitorName
    discipline
    eventId
    eventLocation
    eventName
    isFinal
    participants
    personId
    personName
    pointGain
    ranking
    rankingTo
    series
  }
}
