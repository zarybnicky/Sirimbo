query TrainerAttendanceReport($since: Datetime, $until: Datetime) {
  trainerGroupAttendanceCompletionList(since: $since, until: $until) {
    personId
    totalInstances
    filledInstances
    partiallyFilledInstances
    unfilledInstances
    filledRatio
    pendingAttendances
    person {
      id
      name
    }
  }
}
