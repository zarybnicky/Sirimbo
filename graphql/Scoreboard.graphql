query Scoreboard($cohortId: BigInt, $since: Date, $until: Date) {
  cohortsList(orderBy: [NAME_ASC]) {
    id
    name
  }
  scoreboardEntriesList(cohortId: $cohortId, since: $since, until: $until) {
    totalScore
    lessonTotalScore
    groupTotalScore
    eventTotalScore
    manualTotalScore
    ranking
    personId
    cohortId
    cohort {
      id
      name
    }
    person {
      ...PersonBasic
    }
  }
}
