
mutation CreateInvitation($input: CreatePersonInvitationInput!) {
  createPersonInvitation(input: $input) {
    personInvitation {
      id
      email
      createdAt
    }
  }
}

mutation DeleteInvitation($input: DeletePersonInvitationInput!) {
  deletePersonInvitation(input: $input) {
    __typename
  }
}

query PeopleWithAnotherAccount {
  peopleWithoutAccessWithExistingAccountList {
    id
    name
    email
  }
}

query PeopleWithoutInvitation {
  peopleWithoutAccessOrInvitationList {
    id
    name
    email
    createdAt
  }
}

query PeopleWithInvitation {
  peopleWithoutAccessWithInvitationList {
    id
    name
    email
    createdAt
    personInvitationsList {
      id
      createdAt
      accessToken
    }
  }
}
