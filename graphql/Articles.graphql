fragment Article on Aktuality {
  __typename
  id
  atPreview
  atKdo
  atJmeno
  atText
  createdAt
  updatedAt
  titlePhotoUrl
  galerieFoto {
    id
    gfPath
  }
}

query Article($id: BigInt!) {
  aktuality(id: $id) {
    ...Article
  }
}

query Articles($first: Int, $offset: Int) {
  aktualities(first: $first, offset: $offset, orderBy: [CREATED_AT_DESC]) {
    totalCount
    nodes {
      ...Article
    }
  }
}

mutation CreateArticle($input: AktualityInput!) {
  createAktuality(input: {aktuality: $input}) {
    aktuality {
      ...Article
    }
  }
}

mutation UpdateArticle($id: BigInt!, $patch: AktualityPatch!) {
  updateAktuality(input: {id: $id, patch: $patch}) {
    aktuality {
      ...Article
    }
  }
}

mutation DeleteArticle($id: BigInt!) {
  deleteAktuality(input: {id: $id}) {
    __typename
  }
}
