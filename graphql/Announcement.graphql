fragment AnnouncementAudience on AnnouncementAudience {
  id
  audienceRole
  cohort {
    ...CohortBasic
  }
}

fragment Announcement on Announcement {
  __typename
  id
  title
  body
  createdAt
  updatedAt
  author {
    id
    uJmeno
    uPrijmeni
  }
  announcementAudiences {
    nodes {
      ...AnnouncementAudience
    }
  }
  scheduledSince
  scheduledUntil
  isVisible
  isSticky
}

query StickyAnnouncements($orderByUpdated: Boolean) {
  stickyAnnouncements(orderByUpdated: $orderByUpdated) {
    totalCount
    nodes {
      ...Announcement
    }
  }
}

query MyAnnouncements($archive: Boolean = false, $first: Int, $offset: Int, $orderByUpdated: Boolean) {
  myAnnouncements(
    archive: $archive,
    first: $first,
    offset: $offset,
    orderByUpdated: $orderByUpdated,
  ) {
    totalCount
    nodes {
      ...Announcement
    }
  }
}

query ArchivedAnnouncements($first: Int, $offset: Int) {
  archivedAnnouncements(
    first: $first,
    offset: $offset,
  ) {
    totalCount
    nodes {
      ...Announcement
    }
  }
}

query AnnouncementList($first: Int, $cursor: Cursor, $orderBy: AnnouncementsOrderBy = CREATED_AT_DESC) {
  announcements(
    first: $first,
    after: $cursor,
    orderBy: [$orderBy],
  ) {
    totalCount
    nodes {
      ...Announcement
    }
    pageInfo {
      __typename
      hasNextPage
      endCursor
    }
  }
}

mutation ToggleAnnouncementVisible($id: BigInt!, $visible: Boolean!) {
  updateAnnouncement(input: {id: $id, patch: {isVisible: $visible}}) {
    announcement {
      ...Announcement
    }
  }
}

mutation ToggleAnnouncementSticky($id: BigInt!, $sticky: Boolean!) {
  updateAnnouncement(input: {id: $id, patch: {isSticky: $sticky}}) {
    announcement {
      ...Announcement
    }
  }
}

query Announcement($id: BigInt!) {
  announcement(id: $id) {
    ...Announcement
  }
}

mutation CreateAnnouncement($input: AnnouncementInput!) {
  createAnnouncement(input: {announcement: $input}) {
    announcement {
      ...Announcement
    }
  }
}

mutation UpdateAnnouncement($id: BigInt!, $patch: AnnouncementPatch!) {
  updateAnnouncement(input: {id: $id, patch: $patch}) {
    announcement {
      ...Announcement
    }
  }
}

mutation DeleteAnnouncement($id: BigInt!) {
  deleteAnnouncement(input: {id: $id}) {
    __typename
  }
}
