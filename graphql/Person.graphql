fragment PersonBasic on Person {
  id
  name
  firstName
  lastName
  gender
  birthDate
  email
  phone
  taxIdentificationNumber
}

fragment Person on Person {
  ...PersonBasic
  externalIds
  cstsId
  wdsfId
  nationality
  cohortIds
  isAdmin
  isTrainer
  isMember
  prefixTitle
  suffixTitle
  address {
    city
    region
    street
    district
    postalCode
    orientationNumber
    conscriptionNumber
  }
  note
}

fragment PersonWithLinks on Person {
  ...Person
  cstsProgressList {
    ...CstsProgressRecord
  }
  tenantMembershipsList(orderBy: SINCE_ASC) {
    ...TenantMembership
  }
  cohortMembershipsList(orderBy: SINCE_ASC) {
    ...CohortMembership
    cohort {
      ...Cohort
    }
  }
  tenantAdministratorsList(orderBy: SINCE_ASC) {
    ...TenantAdministrator
  }
  tenantTrainersList(orderBy: SINCE_ASC) {
    ...TenantTrainer
  }
  allCouplesList {
    ...Couple
  }
  userProxiesList {
    ...UserProxy
  }
  personInvitationsList(condition: { usedAt: null }) {
    id
    email
    createdAt
    accessToken
  }
}

query PersonAttendance($id: BigInt!) {
  person(id: $id) {
    ...Person
    eventAttendancesList: recentAttendanceList {
      ...EventAttendance
      instance {
        ...EventInstanceWithTrainer
        event {
          ...Event
        }
      }
    }
  }
}

query PersonPayments($id: BigInt!) {
  person(id: $id) {
    ...Person
    unpaidPayments: paymentDebtorsList(condition: { isUnpaid: true }) {
      id
      price {
        amount
        currency
      }
      payment {
        ...Payment
      }
    }
    accountsList {
      id
      balance
      currency
      postingsList {
        ...Posting
      }
    }
  }
}

query PersonMemberships($id: BigInt!) {
  person(id: $id) {
    ...PersonWithLinks
  }
}

query FullPersonList {
  people {
    nodes {
      ...Person
    }
  }
}

query PersonAccounts {
  filteredPeopleList {
    ...PersonBasic
    accountsList {
      id
      balance
      currency
    }
  }
}

query UnpaidPayments {
  unpaidPayments: paymentDebtorsList(condition: { isUnpaid: true }) {
    id
    person {
      ...PersonBasic
    }
    price {
      amount
      currency
    }
    payment {
      ...Payment
    }
  }
}

query PersonList($inCohorts: [BigInt!], $isTrainer: Boolean, $isAdmin: Boolean, $membershipState: String) {
  filteredPeopleList(inCohorts: $inCohorts, isTrainer: $isTrainer, isAdmin: $isAdmin, membershipState: $membershipState) {
    ...Person
    externalIds
    cohortMembershipsList {
      id
      cohort {
        id
        name
      }
    }
    activeCouplesList {
      ...Couple
    }
  }
}

query PersonWithLinksList {
  filteredPeopleList {
    ...PersonWithLinks
  }
}

query CstsPerson($idt: Int!) {
  cstsAthlete(idt: $idt)
}

query WdsfPerson($min: Int!) {
  wdsfAthlete(min: $min)
}

mutation CreatePerson($input: CreatePersonInput!) {
  createPerson(input: $input) {
    p {
      ...Person
    }
  }
}

mutation UpdatePerson($input: UpdatePersonInput!) {
  updatePerson(input: $input) {
    person {
      ...Person
    }
  }
}

mutation DeletePerson($id: BigInt!) {
  deletePerson(input: { id: $id }) {
    __typename
  }
}
