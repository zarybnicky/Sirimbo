fragment EventInstance on EventInstance {
  parentId
  seriesId
  id
  name
  type
  since
  until
  isCancelled
  locationText
  location {
    id
    name
  }
  stats
}

fragment EventListInstance on EventInstance {
  id
  name
  type
  since
  until
  capacity
  remainingPersonSpots
  location {
    id
    name
  }
  locationText
}

fragment SeriesInfo on SeriesInfo {
  id
  name
  position
  length
  since
  until
}

query EventSeries($id: BigInt!) {
  eventSeries(id: $id) {
    id
    name
    eventsList(condition: { parentId: null }, orderBy: SINCE_ASC) {
      ...EventInstance
    }
    attendanceEventsList: eventsList(orderBy: SINCE_ASC) {
      ...EventInstance
    }
  }
}

fragment EventWithTrainer on EventInstance {
  ...EventInstance
  seriesId
  seriesInfo {
    ...SeriesInfo
  }
  name
  type
  summary
  capacity
  capacityUnit
  isLocked
  isVisible
  isPublic
  enableNotes
  locationText
  remainingPersonSpots
  location {
    id
    name
  }
  trainersList: eventInstanceTrainersByInstanceIdList {
    id
    personId
    lessonsOffered
    person {
      id
      name
    }
  }
  managerPersonIds
  stats
  targetCohortsList {
    id
    cohortId
    cohort {
      id
      name
      colorRgb
    }
  }
  registrations: eventInstanceRegistrationsByInstanceId(
    condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    first: 3
  ) {
    totalCount
    nodes {
      id
      person {
        id
        name
      }
      couple {
        id
        man {
          id
          name
          lastName
        }
        woman {
          id
          name
          lastName
        }
      }
    }
  }
}

fragment EventRegistrationAttendance on EventInstanceRegistration {
  id
  status
  attendanceNote
  attendanceCreatedAt
  attendanceUpdatedAt
  lastAttended
  person {
    id
    name
    firstName
    lastName
  }
}

fragment EventInstanceTrainer on EventInstanceTrainer {
  id
  personId
  lessonsOffered
  lessonsRemaining
  person {
    id
    name
  }
}

fragment EventLessonDemand on EventLessonDemand {
  id
  registrationId
  lessonCount
  trainerId
  trainer {
    id
    person {
      id
      name
    }
  }
}

fragment EventInstanceRegistration on EventInstanceRegistration {
  id
  instanceId
  note
  createdAt
  personId
  person {
    id
    name
    firstName
    lastName
  }
  coupleId
  couple {
    ...Couple
  }
  eventLessonDemandsByRegistrationIdList {
    ...EventLessonDemand
  }
}

query EventInstanceApproxPrice($id: BigInt!) {
  eventInstance(id: $id) {
    id
    approxPriceList {
      amount
      currency
    }
  }
}

fragment EventRegistrant on Person {
  ...PersonBasic
  cohortMembershipsList {
    id
    cohort {
      ...CohortBasic
    }
  }
}

query EventInstanceExport($id: BigInt!) {
  eventInstance(id: $id) {
    id
    name
    type
    trainersList: eventInstanceTrainersByInstanceIdList {
      ...EventInstanceTrainer
    }
    registrations: eventInstanceRegistrationsByInstanceIdList(
      condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    ) {
      ...EventInstanceRegistration
      person {
        ...EventRegistrant
      }
      couple {
        id
        man {
          ...EventRegistrant
        }
        woman {
          ...EventRegistrant
        }
      }
    }
    eventExternalRegistrationsByInstanceIdList {
      ...EventExternalRegistration
    }
  }
}

query EventPayments($id: BigInt!) {
  eventInstance(id: $id) {
    id
    since
    until
    paymentsList {
      ...PaymentDetail
    }
    childEventInstancesList(orderBy: SINCE_ASC) {
      id
      since
      until
      paymentsList {
        ...PaymentDetail
      }
    }
  }
}

fragment EventInstancePage on EventInstance {
  ...EventWithTrainer
  description
  eventExternalRegistrationsByInstanceIdList {
    ...EventExternalRegistration
  }
}

query EventWithAttendance($id: BigInt!) {
  eventInstance(id: $id) {
    ...EventInstancePage
    eventInstanceRegistrationsByInstanceId(
      condition: { registrationStatus: ACTIVE }
    ) {
      nodes {
        ...EventRegistrationAttendance
      }
    }
  }
}

query EventInstanceDescription($id: BigInt!) {
  eventInstance(id: $id) {
    id
    summary
    description
  }
}

query EventInstanceRegistrations($id: BigInt!) {
  eventInstance(id: $id) {
    id
    trainersList: eventInstanceTrainersByInstanceIdList {
      ...EventInstanceTrainer
    }
    registrations: eventInstanceRegistrationsByInstanceId(
      condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    ) {
      nodes {
        ...EventInstanceRegistration
      }
    }
  }
  scheduledLessons: eventInstancesList(
    condition: { parentId: $id, type: LESSON }
  ) {
    id
    trainersList: eventInstanceTrainersByInstanceIdList {
      personId
    }
    registrationsList: eventInstanceRegistrationsByInstanceIdList(
      condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    ) {
      personId
      coupleId
    }
  }
}

query EventList {
  eventInstancesList(
    condition: { type: CAMP, parentId: null }
    orderBy: SINCE_DESC
  ) {
    ...EventListInstance
  }
}

query EventInstanceRange(
  $start: Datetime!
  $end: Datetime!
  $type: EventType
  $trainerIds: [BigInt]
  $participantIds: [BigInt]
  $onlyMine: Boolean,
  $parentId: BigInt
) {
  list: eventInstancesForRangeList(
    startRange: $start
    endRange: $end
    onlyType: $type,
    trainerIds: $trainerIds,
    participantIds: $participantIds,
    onlyMine: $onlyMine,
    parentId: $parentId
  ) {
    ...EventWithTrainer
  }
}

mutation CreateEventInstances($input: QuickCreateEventInstancesInput!) {
  quickCreateEventInstances(input: $input) {
    eventInstances {
      id
    }
  }
}

mutation UpdateEventInstanceDetails($input: UpdateEventInstanceDetailsInput!) {
  updateEventInstanceDetails(input: $input) {
    eventInstance {
      id
    }
  }
}

mutation UpdateEventInstance($id: BigInt!, $patch: EventInstancePatch!) {
  updateEventInstance(input: { id: $id, patch: $patch }) {
    eventInstance {
      ...EventInstance
    }
  }
}

mutation DeleteEventInstance($id: BigInt!) {
  deleteEventInstance(input: { id: $id }) {
    __typename
  }
}

mutation DeleteEventExternalRegistration($id: BigInt!) {
  deleteEventExternalRegistration(input: { id: $id }) {
    __typename
  }
}

fragment EventExternalRegistration on EventExternalRegistration {
  id
  birthDate
  nationality
  note
  phone
  prefixTitle
  suffixTitle
  taxIdentificationNumber
  updatedAt
  createdAt
  email
  instanceId
  firstName
  lastName
}

mutation RegisterToEventExternal($input: CreateEventExternalRegistrationInput!) {
  createEventExternalRegistration(input: $input) {
    __typename
  }
}

mutation SetLessonDemand($input: SetLessonDemandInput!) {
  setLessonDemand(input: $input) {
    eventLessonDemand {
      id
      lessonCount
      trainerId
    }
  }
}

mutation SetEventInstanceRegistration($input: SetEventInstanceRegistrationInput!) {
  setEventInstanceRegistration(input: $input) {
    eventInstanceRegistration {
      ...EventInstanceRegistration
      registrationStatus
      instance {
        id
        remainingPersonSpots
      }
    }
  }
}

mutation MoveEventInstance($input: MoveEventInstanceInput!) {
  moveEventInstance(input: $input) {
    eventInstance {
      id
      since
      until
      locationText
      location {
        id
        name
      }
      trainersList: eventInstanceTrainersByInstanceIdList {
        id
        personId
        person {
          id
          name
        }
      }
      managerPersonIds
    }
  }
}

mutation UpdateAttendance($input: UpdateAttendanceInput!) {
  updateAttendance(input: $input) {
    eventInstanceRegistration {
      id
      status
      attendanceNote
      attendanceUpdatedAt
      lastAttended
    }
  }
}
