fragment Event on Event {
  id
  type
  summary
  description
  name
  capacity
  remainingPersonSpots
  remainingLessons
  location {
    id
    name
  }
  locationText
  isLocked
  isVisible
  isPublic
  enableNotes
  eventTrainersList {
    id
    name
    personId
    lessonsOffered
    lessonsRemaining
  }
  eventInstancesList(orderBy: SINCE_ASC) {
    ...EventInstance
  }
  eventTargetCohortsList {
    id
    cohort {
      id
      name
      colorRgb
    }
  }
  myRegistrationsList {
    ...EventRegistration
  }
  eventRegistrations(first: 3) {
    totalCount
    nodes {
      ...EventRegistration
    }
  }
}

fragment EventRegistrations on Event {
  id
  eventRegistrationsList {
    ...EventRegistration
  }
  eventExternalRegistrationsList {
    ...EventExternalRegistration
  }
}

fragment EventInstance on EventInstance {
  id
  since
  until
  isCancelled
}

fragment EventInstanceWithTrainer on EventInstance {
  ...EventInstance
  eventId
  parentId
  name
  type
  summary
  capacity
  capacityUnit
  isLocked
  isVisible
  isPublic
  locationText
  remainingPersonSpots
  location {
    id
    name
  }
  eventInstanceTrainersByInstanceIdList {
    id
    personId
  }
  trainersList {
    id
    personId
    person {
      id
      name
    }
  }
  managerPersonIds
  stats
  targetCohortsList {
    id
    cohort {
      id
      name
      colorRgb
    }
  }
  myRegistrationsList {
    ...EventRegistration
  }
  registrations(first: 3) {
    totalCount
    nodes {
      id
      person {
        id
        name
      }
      couple {
        id
        man {
          id
          name
          lastName
        }
        woman {
          id
          name
          lastName
        }
      }
    }
  }
  instanceRegistrations: eventInstanceRegistrationsByInstanceId(
    condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    first: 3
  ) {
    totalCount
    nodes {
      id
      person {
        id
        name
      }
      couple {
        id
        man {
          id
          name
          lastName
        }
        woman {
          id
          name
          lastName
        }
      }
    }
  }
}

fragment EventAttendanceSummary on Event {
  id
  eventInstancesList(orderBy: SINCE_ASC) {
    ...EventInstance
    stats
  }
}

fragment EventInstanceRegistrationAttendance on EventInstanceRegistration {
  id
  status
  attendanceNote
  attendanceCreatedAt
  attendanceUpdatedAt
  lastAttended
  person {
    id
    name
    firstName
    lastName
  }
}

fragment EventRegistration on EventRegistration {
  id
  note
  eventId
  personId
  person {
    id
    name
    firstName
    lastName
  }
  coupleId
  couple {
    ...Couple
  }
  eventLessonDemandsByRegistrationIdList {
    id
    lessonCount
    trainerId
  }
  createdAt
}

fragment EventFull on Event {
  ...Event
  ...EventRegistrations
  ...EventAttendanceSummary
  eventInstancesList(orderBy: SINCE_ASC) {
    ...EventInstanceWithTrainer
  }
}

query EventInstanceApproxPrice($id: BigInt!) {
  eventInstance(id: $id) {
    id
    approxPriceList {
      amount
      currency
    }
  }
}

query EventRegistrants($id: BigInt!) {
  event(id: $id) {
    id
    name
    eventExternalRegistrationsList {
      ...EventExternalRegistration
    }
    registrantsList {
      ...PersonBasic
      cohortMembershipsList {
        id
        cohort {
          ...CohortBasic
        }
      }
    }
  }
}

query Event($id: BigInt!) {
  event(id: $id) {
    ...EventFull
  }
}

query EventPayments($id: BigInt!) {
  event(id: $id) {
    id
    eventRegistrationsList {
      id
      paymentsList {
        ...PaymentDetail
      }
    }
    eventInstancesList {
      id
      since
      until
      paymentsList {
        ...PaymentDetail
      }
    }
  }
}

query EventInstanceWithAttendance($id: BigInt!) {
  eventInstance(id: $id) {
    ...EventInstanceWithTrainer
    eventInstanceRegistrationsByInstanceId(
      condition: { registrationStatus: ACTIVE }
    ) {
      nodes {
        ...EventInstanceRegistrationAttendance
      }
    }
  }
}

query EventInstanceRegistrations($id: BigInt!) {
  eventInstance(id: $id) {
    id
    registrations: eventInstanceRegistrationsByInstanceId(
      condition: { parentRegistrationId: null, registrationStatus: ACTIVE }
    ) {
      nodes {
        id
        personId
        person {
          id
          name
        }
        coupleId
        couple {
          id
          man {
            id
            name
            lastName
          }
          woman {
            id
            name
            lastName
          }
        }
      }
    }
  }
}

query EventList {
  events(condition: { type: CAMP }) {
    totalCount
    edges {
      cursor
      node {
        ...Event
      }
    }
    pageInfo {
      __typename
      hasNextPage
      endCursor
    }
  }
}

query EventInstanceRange(
  $start: Datetime!
  $end: Datetime!
  $type: EventType
  $trainerIds: [BigInt]
  $participantIds: [BigInt]
  $onlyMine: Boolean,
  $parentId: BigInt
) {
  list: eventInstancesForRangeList(
    startRange: $start
    endRange: $end
    onlyType: $type,
    trainerIds: $trainerIds,
    participantIds: $participantIds,
    onlyMine: $onlyMine,
    parentId: $parentId
  ) {
    ...EventInstanceWithTrainer
  }
}

mutation UpsertEvent($input: UpsertEventInput!) {
  upsertEvent(input: $input) {
    event {
      ...Event
      eventInstancesList(orderBy: SINCE_ASC) {
        ...EventInstanceWithTrainer
      }
    }
  }
}

mutation CreateEventInstances($input: QuickCreateEventInstancesInput!) {
  quickCreateEventInstances(input: $input) {
    eventInstances {
      id
    }
  }
}

mutation UpdateEventInstanceDetails($input: UpdateEventInstanceDetailsInput!) {
  updateEventInstanceDetails(input: $input) {
    eventInstance {
      id
    }
  }
}

mutation DetachEventInstance($id: BigInt!) {
  detachEventInstance(input: { pInstanceId: $id }) {
    event {
      ...Event
    }
  }
}

mutation UpdateEvent($id: BigInt!, $patch: EventPatch!) {
  updateEvent(input: { id: $id, patch: $patch }) {
    event {
      ...Event
    }
  }
}

mutation UpdateEventInstance($id: BigInt!, $patch: EventInstancePatch!) {
  updateEventInstance(input: { id: $id, patch: $patch }) {
    eventInstance {
      ...EventInstance
    }
  }
}

mutation DeleteEventInstance($id: BigInt!) {
  deleteEventInstance(input: { id: $id }) {
    __typename
  }
}

mutation DeleteEventExternalRegistration($id: BigInt!) {
  deleteEventExternalRegistration(input: { id: $id }) {
    __typename
  }
}

mutation RegisterToEvent($input: RegisterToEventManyInput!) {
  registerToEventMany(input: $input) {
    eventRegistrations {
      ...EventRegistration
    }
  }
}

fragment EventExternalRegistration on EventExternalRegistration {
  id
  birthDate
  nationality
  note
  phone
  prefixTitle
  suffixTitle
  taxIdentificationNumber
  updatedAt
  createdAt
  email
  eventId
  firstName
  lastName
}

mutation RegisterToEventExternal($input: CreateEventExternalRegistrationInput!) {
  createEventExternalRegistration(input: $input) {
    __typename
  }
}

mutation EditRegistration($input: EditRegistrationInput!) {
  editRegistration(input: $input) {
    eventRegistration {
      ...EventRegistration
    }
  }
}

mutation CancelRegistration($input: CancelRegistrationInput!) {
  cancelRegistration(input: $input) {
    __typename
  }
}

mutation SetLessonDemand($input: SetLessonDemandInput!) {
  setLessonDemand(input: $input) {
    eventLessonDemand {
      id
      lessonCount
      trainerId
    }
  }
}

mutation SetEventInstanceRegistration($input: SetEventInstanceRegistrationInput!) {
  setEventInstanceRegistration(input: $input) {
    eventInstanceRegistration {
      id
      instanceId
      personId
      coupleId
      registrationStatus
      instance {
        id
        remainingPersonSpots
      }
    }
  }
}

mutation MoveEventInstance($input: MoveEventInstanceInput!) {
  moveEventInstance(input: $input) {
    eventInstance {
      id
      since
      until
      locationText
      location {
        id
        name
      }
      eventInstanceTrainersByInstanceIdList {
        id
        personId
      }
      trainersList {
        id
        personId
        person {
          id
          name
        }
      }
      managerPersonIds
    }
  }
}

mutation UpdateAttendance($input: UpdateAttendanceInput!) {
  updateAttendance(input: $input) {
    eventInstanceRegistration {
      id
      status
      attendanceNote
      attendanceUpdatedAt
      lastAttended
    }
  }
}
