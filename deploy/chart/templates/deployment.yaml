apiVersion: apps/v1
kind: Deployment
metadata:
  name: sirimbo
  labels:
    app.kubernetes.io/name: sirimbo
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sirimbo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sirimbo
    spec:
      containers:
        - name: sirimbo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PGHOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: PGUSER
              value: {{ .Values.postgresql.user | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgresql.database | quote }}
            - name: S3_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: S3_PORT
              value: {{ .Values.s3.port | quote }}
            - name: S3_REGION
              value: {{ .Values.s3.region | quote }}
            - name: S3_BUCKET
              value: {{ .Values.s3.bucket | quote }}
            - name: S3_ACCESS_KEY_ID
              value: {{ .Values.s3.accessKeyId | quote }}
            - name: S3_SECRET_ACCESS_KEY
              value: {{ .Values.s3.secretAccessKey | quote }}
            - name: GRAPHQL_BACKEND
              value: {{ .Values.runtime.graphqlBackend | quote }}
            - name: NEXT_PUBLIC_SENTRY_ENVIRONMENT
              value: {{ .Values.runtime.sentryEnvironment | quote }}
            - name: NEXT_PUBLIC_SENTRY_DSN
              value: {{ .Values.runtime.sentryDsn | quote }}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
